<?xml version="1.0" encoding="UTF-8"?>
<!--
  ChurchFlow app icon — open book with bookmark.
  1024×1024, content inside iOS safe area (inner 80%).
  Colours pulled from src/theme.ts.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#B0202C"/>
  <g transform="translate(512 482)">
    <!-- Left page -->
    <path d="M -280 -180 L -20 -200 L -20 180 L -280 160 Z" fill="#FAF6EC"/>
    <!-- Right page -->
    <path d="M 20 -200 L 280 -180 L 280 160 L 20 180 Z" fill="#FAF6EC"/>
    <!-- Stylised text bands (scarlet on the cream pages) -->
    <rect x="-240" y="-130" width="180" height="16" rx="8" fill="#B0202C" opacity="0.85"/>
    <rect x="-240" y="-80"  width="200" height="14" rx="7" fill="#B0202C" opacity="0.45"/>
    <rect x="-240" y="-40"  width="200" height="14" rx="7" fill="#B0202C" opacity="0.45"/>
    <rect x="-240" y="0"    width="160" height="14" rx="7" fill="#B0202C" opacity="0.45"/>
    <rect x="60"   y="-130" width="180" height="14" rx="7" fill="#B0202C" opacity="0.45"/>
    <rect x="60"   y="-80"  width="200" height="14" rx="7" fill="#B0202C" opacity="0.45"/>
    <rect x="60"   y="-40"  width="200" height="14" rx="7" fill="#B0202C" opacity="0.45"/>
    <rect x="60"   y="0"    width="160" height="14" rx="7" fill="#B0202C" opacity="0.45"/>
    <!-- Gold bookmark ribbon, dropping below the pages -->
    <path d="M -30 160 L -30 330 L 0 290 L 30 330 L 30 160 Z" fill="#C89441"/>
  </g>
</svg>
