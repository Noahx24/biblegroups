<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="grad" cx="20%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#B0202C" stop-opacity=".10"/>
